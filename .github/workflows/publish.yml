name: Publish to NuGet

on:
  push:
    branches: [ main ]
    paths:
      - 'Directory.Build.props'

  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Force NuGet publish (bypass version check)'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest

    environment:
      name: nuget-production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for version detection

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run tests (CI - No API keys)
      run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=Performance&Category!=Integration&Category!=RequiresApiKey"

    - name: Extract version from Directory.Build.props
      id: extract_version
      run: |
        VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Extracted version: $VERSION"

    - name: Check if any package needs publishing
      id: check_version
      if: ${{ !inputs.force_publish }}
      run: |
        VERSION="${{ steps.extract_version.outputs.version }}"
        echo "🔍 Checking version $VERSION on NuGet.org..."

        # List of packages to check
        PACKAGES=(
          "Ironbees.Core"
          "Ironbees.AgentFramework"
          "Ironbees.AgentMode"
          "Ironbees.Autonomous"
          "Ironbees.Ironhive"
        )

        NEEDS_PUBLISH=false
        for PACKAGE in "${PACKAGES[@]}"; do
          EXISTS=$(dotnet nuget search "$PACKAGE" --exact-match --take 1 --source https://api.nuget.org/v3/index.json | grep -c "$PACKAGE | $VERSION" || true)
          if [ "$EXISTS" -eq "0" ]; then
            echo "✅ $PACKAGE version $VERSION not found - needs publishing"
            NEEDS_PUBLISH=true
          else
            echo "⏭️ $PACKAGE version $VERSION already exists"
          fi
        done

        if [ "$NEEDS_PUBLISH" = true ]; then
          echo "should_publish=true" >> $GITHUB_OUTPUT
          echo "📤 At least one package needs publishing"
        else
          echo "should_publish=false" >> $GITHUB_OUTPUT
          echo "⚠️ All packages version $VERSION already exist on NuGet.org"
        fi

    - name: Pack all NuGet packages
      if: ${{ steps.check_version.outputs.should_publish == 'true' || inputs.force_publish }}
      run: |
        echo "📦 Creating packages directory..."
        mkdir -p ./packages

        echo "🔨 Packing Ironbees.Core..."
        dotnet pack src/Ironbees.Core/Ironbees.Core.csproj \
          --configuration Release \
          --no-build \
          --output ./packages

        echo "🔨 Packing Ironbees.AgentFramework..."
        dotnet pack src/Ironbees.AgentFramework/Ironbees.AgentFramework.csproj \
          --configuration Release \
          --no-build \
          --output ./packages

        echo "🔨 Packing Ironbees.AgentMode..."
        dotnet pack src/Ironbees.AgentMode/Ironbees.AgentMode.csproj \
          --configuration Release \
          --no-build \
          --output ./packages

        echo "🔨 Packing Ironbees.Autonomous..."
        dotnet pack src/Ironbees.Autonomous/Ironbees.Autonomous.csproj \
          --configuration Release \
          --no-build \
          --output ./packages

        echo "🔨 Packing Ironbees.Ironhive..."
        dotnet pack src/Ironbees.Ironhive/Ironbees.Ironhive.csproj \
          --configuration Release \
          --no-build \
          --output ./packages

        echo "✅ All packages created"
        ls -lh ./packages/

    - name: Publish to NuGet.org
      if: ${{ steps.check_version.outputs.should_publish == 'true' || inputs.force_publish }}
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        if [ -d "./packages" ]; then
          dotnet nuget push "./packages/*.nupkg" \
            --api-key $NUGET_API_KEY \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

          echo "✅ Successfully published packages to NuGet.org"
        else
          echo "⚠️ No packages to publish"
        fi

    - name: Create GitHub Release
      if: ${{ (steps.check_version.outputs.should_publish == 'true' || inputs.force_publish) && github.event_name == 'push' }}
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.extract_version.outputs.version }}
        name: Release v${{ steps.extract_version.outputs.version }}
        body: |
          ## Ironbees v${{ steps.extract_version.outputs.version }}

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

          ### 📦 Published Packages

          **Core Packages:**
          - [Ironbees.Core ${{ steps.extract_version.outputs.version }}](https://www.nuget.org/packages/Ironbees.Core/${{ steps.extract_version.outputs.version }})
          - [Ironbees.AgentFramework ${{ steps.extract_version.outputs.version }}](https://www.nuget.org/packages/Ironbees.AgentFramework/${{ steps.extract_version.outputs.version }})
          - [Ironbees.AgentMode ${{ steps.extract_version.outputs.version }}](https://www.nuget.org/packages/Ironbees.AgentMode/${{ steps.extract_version.outputs.version }})
          - [Ironbees.Autonomous ${{ steps.extract_version.outputs.version }}](https://www.nuget.org/packages/Ironbees.Autonomous/${{ steps.extract_version.outputs.version }})
          - [Ironbees.Ironhive ${{ steps.extract_version.outputs.version }}](https://www.nuget.org/packages/Ironbees.Ironhive/${{ steps.extract_version.outputs.version }})
        draft: false
        prerelease: ${{ contains(steps.extract_version.outputs.version, 'preview') || contains(steps.extract_version.outputs.version, 'beta') || contains(steps.extract_version.outputs.version, 'alpha') }}
        files: ./packages/*.nupkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Summary
      if: always()
      run: |
        echo "## Publish Summary" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ steps.extract_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Force Publish**: ${{ inputs.force_publish || 'false' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

        if [ "${{ steps.check_version.outputs.should_publish }}" == "true" ] || [ "${{ inputs.force_publish }}" == "true" ]; then
          echo "- **Status**: ✅ Published" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Status**: ⏭️ Skipped (version already exists)" >> $GITHUB_STEP_SUMMARY
        fi
